<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B4FF6F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9FE65A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bgGradient)"/>
  
  <!-- Accent border -->
  <rect width="128" height="128" rx="24" fill="none" stroke="#B4FF6F" stroke-width="3" opacity="0.3"/>
  
  <!-- MO Text -->
  <text x="64" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="url(#textGradient)" letter-spacing="-2">MO</text>
  
  <!-- Subtle code bracket accent -->
  <path d="M 28 40 L 24 44 L 28 48" stroke="#B4FF6F" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 100 40 L 104 44 L 100 48" stroke="#B4FF6F" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
